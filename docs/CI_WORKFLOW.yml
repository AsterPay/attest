# Copy to .github/workflows/ci.yml after first push (or push with a token that has `workflow` scope).
# GitHub OAuth apps without workflow scope reject pushes that add Actions files.

name: attest-ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm install
      - run: npm run build
      - run: npm test

  attest-check-self:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm install
      - run: npm run build
      - run: node packages/cli/dist/cli.js check -r .
